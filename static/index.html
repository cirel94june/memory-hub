<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Hub</title>
<style>
:root {
  --bg: #f8f5f0;
  --card: #fffdf9;
  --border: #e8e0d4;
  --text: #3a3530;
  --text2: #9a8e80;
  --text3: #c4b8a8;
  --accent: #c4956a;
  --accent2: #f5ece2;
  --accent-light: #faf4ed;
  --danger: #d4756a;
  --success: #7ab87f;
  --warning: #d4a84a;
  --blue: #6a9ec4;
  --purple: #9a7ec4;
  --radius: 12px;
  --shadow: 0 2px 8px rgba(80,60,40,0.06);
  --shadow-hover: 0 4px 16px rgba(80,60,40,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
}

/* ── 顶栏 ── */
.header {
  background: linear-gradient(135deg, #f5ece2 0%, #ede4d8 100%);
  border-bottom: 1px solid var(--border);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-left h1 { font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.header-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--accent);
  color: white;
  font-weight: 500;
}
.header-actions { display: flex; gap: 8px; }
.btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  font-size: 13px;
  transition: all 0.2s;
  font-family: inherit;
  color: var(--text);
}
.btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: var(--shadow); }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.88; box-shadow: 0 2px 12px rgba(196,149,106,0.3); }
.btn-danger { color: var(--danger); border-color: var(--danger); }
.btn-sm { padding: 4px 12px; font-size: 12px; }

/* ── 布局 ── */
.layout {
  display: flex;
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px;
  gap: 24px;
}
.sidebar { width: 220px; flex-shrink: 0; }
.main { flex: 1; min-width: 0; }

/* ── 侧栏 ── */
.nav-group { margin-bottom: 24px; }
.nav-group h3 {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text3);
  letter-spacing: 1.5px;
  padding: 0 14px;
  margin-bottom: 8px;
  font-weight: 600;
}
.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13.5px;
  color: var(--text);
  text-decoration: none;
  transition: all 0.15s;
}
.nav-item:hover { background: var(--accent2); }
.nav-item.active { background: var(--accent2); color: var(--accent); font-weight: 600; }
.nav-icon { margin-right: 6px; }
.nav-count {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
  font-weight: 500;
}
.nav-item.active .nav-count { background: var(--accent); color: white; }

/* ── 统计面板 ── */
.stats-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.stats-row {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }
.health-bar {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.health-bar-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.health-bar-track {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
}
.health-bar-fill {
  height: 100%;
  transition: width 0.5s;
}

/* ── 搜索 ── */
.search-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.search-bar input {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  outline: none;
  background: var(--card);
  font-family: inherit;
  transition: border-color 0.2s;
}
.search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,149,106,0.1); }

/* ── 记忆卡片 ── */
.memory-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  position: relative;
}
.memory-card:hover { border-color: var(--accent); box-shadow: var(--shadow-hover); }
.memory-card.truncated { border-left: 3px solid var(--danger); }
.memory-card.high-importance { border-left: 3px solid var(--accent); }

.memory-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.memory-category {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.memory-content {
  font-size: 14px;
  margin-bottom: 10px;
  word-break: break-word;
  white-space: pre-line;
  color: var(--text);
  line-height: 1.7;
}
.memory-content.collapsed {
  max-height: 120px;
  overflow: hidden;
  position: relative;
}
.memory-content.collapsed::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: linear-gradient(transparent, var(--card));
}
.expand-btn {
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  border: none;
  background: none;
  padding: 4px 0;
  font-family: inherit;
}
.expand-btn:hover { text-decoration: underline; }

.memory-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}
.tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
}
.tag-room { background: #f0ebe3; color: #8b7355; }
.tag-domain { background: #e3eef5; color: #4a7da8; }
.tag-layer-shared { background: #e8f5e9; color: #558b55; }
.tag-layer-private { background: #fce4ec; color: #c0625a; }
.tag-ai {
  padding: 2px 10px;
  border-radius: 6px;
  color: white;
  font-size: 11px;
  font-weight: 500;
}
.tag-truncated { background: #fdeaea; color: var(--danger); font-weight: 600; }

.memory-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.memory-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text2);
}
.importance-dots {
  display: inline-flex;
  gap: 2px;
}
.importance-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
}
.importance-dot.filled { background: var(--accent); }

.importance-editor {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.importance-label {
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
}
.importance-dot-btn {
  width: 10px;
  height: 10px;
  padding: 0;
  border: none;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: transform 0.15s, background 0.15s;
}
.importance-dot-btn:hover {
  transform: scale(1.2);
  background: #e8c4a8;
}
.importance-dot-btn.filled { background: var(--accent); }
.importance-val {
  font-size: 11px;
  color: var(--text2);
  min-width: 24px;
  font-variant-numeric: tabular-nums;
}
.importance-editor.saving .importance-val { color: var(--accent); }

.memory-actions {
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.2s;
}
.memory-card:hover .memory-actions { opacity: 1; }

/* ── 空状态 ── */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text2);
}
.empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
.empty p { font-size: 15px; }

/* ── 分页 ── */
.pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 20px;
}

/* ── 模态框 ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(60,50,40,0.35);
  z-index: 200;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(2px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card);
  border-radius: 16px;
  padding: 28px;
  width: 520px;
  max-width: 92vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(60,40,20,0.15);
}
.modal h2 { font-size: 17px; margin-bottom: 20px; font-weight: 700; }
.modal label { display: block; font-size: 13px; color: var(--text2); margin: 12px 0 5px; font-weight: 500; }
.modal input, .modal select, .modal textarea {
  width: 100%;
  padding: 9px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  background: var(--bg);
  transition: border-color 0.2s;
}
.modal input:focus, .modal select:focus, .modal textarea:focus {
  border-color: var(--accent);
  background: var(--card);
}
.modal textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* ── 时间线视图 ── */
.timeline { padding-left: 8px; }
.timeline-date { margin: 20px 0 10px 0; }
.timeline-date-label {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  padding: 6px 0;
  border-bottom: 2px solid var(--accent);
  display: inline-block;
}
.timeline-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 8px;
  padding-left: 4px;
}
.timeline-time {
  width: 44px;
  flex-shrink: 0;
  font-size: 12px;
  color: var(--text2);
  padding-top: 12px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.timeline-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 14px;
}
.timeline-content {
  flex: 1;
  min-width: 0;
}
.timeline-content .memory-content {
  font-size: 14px;
  max-height: none;
}

/* ── 日历热力图 ── */
.calendar-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}
.calendar-panel h3 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.calendar-panel h3 .cal-year {
  color: var(--text2);
  font-weight: 400;
  font-size: 13px;
}
.cal-nav {
  display: flex;
  gap: 8px;
  margin-left: auto;
}
.cal-months {
  display: flex;
  gap: 2px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.cal-month {
  flex-shrink: 0;
}
.cal-month-label {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
  font-weight: 500;
  padding-left: 2px;
}
.cal-weeks {
  display: flex;
  gap: 2px;
}
.cal-week {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cal-day {
  width: 13px;
  height: 13px;
  border-radius: 2px;
  background: var(--border);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.cal-day:hover {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
  z-index: 1;
}
.cal-day.selected {
  outline: 2px solid var(--text);
  outline-offset: -1px;
  z-index: 2;
}
.cal-day.empty { background: transparent; cursor: default; }
.cal-day.empty:hover { outline: none; }
.cal-day.future { background: var(--bg); cursor: default; }
.cal-day.future:hover { outline: none; }
.cal-day.lv1 { background: #f5dcc4; }
.cal-day.lv2 { background: #e8be8e; }
.cal-day.lv3 { background: #d4a06a; }
.cal-day.lv4 { background: #c4854a; }
.cal-day.lv5 { background: #a06030; }
.cal-legend {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 12px;
  font-size: 11px;
  color: var(--text3);
  justify-content: flex-end;
}
.cal-legend-box {
  width: 13px;
  height: 13px;
  border-radius: 2px;
}
.cal-tooltip {
  position: fixed;
  background: var(--text);
  color: white;
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  pointer-events: none;
  z-index: 300;
  white-space: nowrap;
  display: none;
}
.cal-day-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--accent);
}
.cal-day-header h3 {
  font-size: 16px;
  font-weight: 700;
}
.cal-day-header .count {
  font-size: 13px;
  color: var(--text2);
}

/* ── 响应式 ── */
@media (max-width: 768px) {
  .layout { flex-direction: column; padding: 12px; gap: 16px; }
  .sidebar { width: 100%; }
  .sidebar .nav-group { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .sidebar .nav-group h3 { width: 100%; margin-bottom: 4px; }
  .sidebar .nav-item { padding: 6px 12px; font-size: 12px; }
  .stats-row { gap: 16px; }
  .stat-num { font-size: 22px; }
  .header { padding: 14px 16px; }
  .header h1 { font-size: 16px; }
  .memory-actions { opacity: 1; }
}

/* ── 设置 & 活动日志页面 ── */
.page-panel { display: none; }
.page-panel.active { display: block; }
.settings-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.settings-card h3 { font-size: 15px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.settings-card label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 12px; }
.settings-card input[type="text"],
.settings-card input[type="password"] {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: 'SF Mono', 'Consolas', monospace; background: var(--bg);
}
.settings-card input:focus { outline: none; border-color: var(--accent); }
.settings-actions { margin-top: 16px; display: flex; gap: 8px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.ok { background: var(--success); }
.status-dot.err { background: var(--danger); }
.status-dot.warn { background: var(--warning); }
.override-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 12px;
  background: var(--warning); color: white; font-weight: 500;
}

/* Activity log */
.activity-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.activity-filters .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.log-entry {
  display: flex; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 13px; align-items: flex-start; transition: background 0.15s;
}
.log-entry:hover { background: var(--accent-light); }
.log-time { color: var(--text3); white-space: nowrap; font-size: 12px; min-width: 55px; font-family: monospace; }
.log-action {
  font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap;
  font-weight: 500; min-width: 52px; text-align: center;
}
.log-action.analyze { background: #e3f2fd; color: #1565c0; }
.log-action.merge { background: #f3e5f5; color: #7b1fa2; }
.log-action.digest { background: #e8f5e9; color: #2e7d32; }
.log-action.decay { background: #fff3e0; color: #e65100; }
.log-action.remember { background: #e0f7fa; color: #00695c; }
.log-action.recall { background: #fce4ec; color: #c62828; }
.log-action.error { background: #ffebee; color: #b71c1c; }
.log-action.config { background: #f5f5f5; color: #424242; }
.log-action.relation { background: #ede7f6; color: #4527a0; }
.log-detail { flex: 1; color: var(--text); line-height: 1.5; word-break: break-all; }
.log-model { color: var(--text3); font-size: 11px; white-space: nowrap; }
.log-duration { color: var(--text3); font-size: 11px; white-space: nowrap; }
.log-fail { color: var(--danger); }
.activity-stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.activity-stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; text-align: center;
}
.activity-stat-card .num { font-size: 24px; font-weight: 700; color: var(--accent); }
.activity-stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Memory Hub</h1>
    <span class="header-badge" id="headerBadge">0 memories</span>
  </div>
  <div class="header-actions">
    <button class="btn" id="viewToggle" onclick="toggleCalendarView()">📅 日历</button>
    <button class="btn" onclick="openAddModal()">+ 添加</button>
    <button class="btn" onclick="openImportModal()">📥 导入</button>
    <button class="btn" onclick="runMaintain()">整理</button>
    <button class="btn" onclick="exportMemories()">导出</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main">
    <!-- 记忆页（默认） -->
    <div class="page-panel active" id="page-memories">
      <div id="calendarPanel" class="calendar-panel" style="display:none"></div>
      <div id="calendarDayDetail" style="display:none"></div>
      <div class="stats-panel" id="statsPanel"></div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索记忆..." onkeydown="if(event.key==='Enter')searchMemories()">
        <button class="btn btn-primary" onclick="searchMemories()">搜索</button>
      </div>
      <div id="memoryList"></div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- 活动日志页 -->
    <div class="page-panel" id="page-activity">
      <h2 style="margin-bottom:16px">📊 小模型活动日志</h2>
      <div class="activity-stats-grid" id="activityStats"></div>
      <div class="activity-filters" id="activityFilters">
        <button class="btn btn-sm active" onclick="filterActivity('',this)">全部</button>
        <button class="btn btn-sm" onclick="filterActivity('analyze',this)">🔍 分析</button>
        <button class="btn btn-sm" onclick="filterActivity('merge',this)">🔀 合并</button>
        <button class="btn btn-sm" onclick="filterActivity('digest',this)">✂️ 拆分</button>
        <button class="btn btn-sm" onclick="filterActivity('decay',this)">📉 衰减</button>
        <button class="btn btn-sm" onclick="filterActivity('remember',this)">💾 记忆</button>
        <button class="btn btn-sm" onclick="filterActivity('recall',this)">🔎 搜索</button>
        <button class="btn btn-sm" onclick="filterActivity('error',this)">❌ 错误</button>
        <button class="btn btn-sm" onclick="filterActivity('config',this)">⚙️ 配置</button>
        <button class="btn btn-sm" style="margin-left:auto" onclick="loadActivityLog()">🔄 刷新</button>
      </div>
      <div class="settings-card" style="padding:0;overflow:hidden" id="activityLog">
        <div style="padding:20px;color:var(--text3);text-align:center">加载中...</div>
      </div>
    </div>

    <!-- 模型设置页 -->
    <div class="page-panel" id="page-settings">
      <h2 style="margin-bottom:16px">⚙️ 模型设置</h2>

      <div class="settings-card">
        <h3><span class="status-dot" id="llmStatusDot"></span> 当前模型配置 <span id="overrideBadge"></span></h3>
        <label>中转站 URL</label>
        <input type="text" id="settingBaseUrl" placeholder="https://relay.example.com/v1">
        <label>模型名称</label>
        <input type="text" id="settingModel" placeholder="claude-haiku-4-5">
        <label>API Key</label>

        <div class="settings-actions">
          <button class="btn btn-primary" onclick="saveLLMSettings()">保存并切换</button>
          <button class="btn" onclick="testLLMSettings()">🧪 测试连通</button>
          <button class="btn btn-danger" onclick="resetLLMSettings()">↩️ 恢复默认</button>
        </div>

      <div class="settings-card">
        <h3>📋 .env 默认配置（只读）</h3>
        <div id="defaultConfig" style="font-size:13px;color:var(--text2);font-family:monospace;line-height:1.8"></div>
      </div>

      <div class="settings-card">
        <h3>🧮 Embedding 模型（只读）</h3>
        <p style="font-size:12px;color:var(--text2);margin-bottom:12px">更换 embedding 模型需要重建所有向量，不支持在线切换</p>
        <div id="embeddingInfo" style="font-size:13px;font-family:monospace;line-height:1.8;color:var(--text2)">加载中...</div>
        <div style="margin-top:10px">
          <button class="btn" onclick="testEmbedding()">🧪 测试 Embedding</button>
          <span id="embeddingTestResult" style="margin-left:10px;font-size:13px"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="cal-tooltip" id="calTooltip"></div>

<!-- 添加/编辑模态框 -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <h2 id="modalTitle">添加记忆</h2>

    <input type="range" id="mImportance" min="0" max="1" step="0.1" value="0.5">

<!-- 导入对话模态框 -->
<div class="modal-overlay" id="importModal" onclick="if(event.target===this)closeImportModal()">
  <div class="modal">
    <h2>📥 导入对话</h2>
    <p style="color:var(--text2);font-size:13px;margin-bottom:12px">粘贴对话文本或 JSON，自动提取记忆和用户画像</p>

    <label>对话内容</label>
    <textarea id="importContent" placeholder="支持格式：&#10;1. JSON: [{&quot;role&quot;:&quot;user&quot;,&quot;content&quot;:&quot;...&quot;},...]&#10;2. 纯文本: 用户: xxx / AI: xxx&#10;3. Telegram 导出 JSON" style="height:200px"></textarea>

      <option value="claude">Claude</option>
      <option value="cloudy">小克 (TG)</option>

      <option value="jasper">Jasper (TG)</option>
      <option value="gemini">Gemini</option>
      <option value="gpt">GPT</option>
    </select>

    <div id="importResult" style="display:none;margin-top:12px;padding:12px;border-radius:8px;background:var(--accent-light);font-size:13px"></div>

<script>
const API = '';
let TOKEN = localStorage.getItem('hub_token') || '';
let currentFilter = 'all';
let currentPage = 1;
let allRoomCounts = {};
let totalMemories = 0;

const ROOM_META = {
  living_room: { icon: '🏠', name: '客厅', group: 'shared' },
  career: { icon: '💼', name: '职业生涯', group: 'shared' },
  psychology: { icon: '🧠', name: '心理状态', group: 'shared' },
  health: { icon: '❤️', name: '身体健康', group: 'shared' },
  learning: { icon: '📚', name: '学习目标', group: 'shared' },
  relationships: { icon: '👥', name: '人际关系', group: 'shared' },
  preferences: { icon: '✨', name: '兴趣偏好', group: 'shared' },
  work_tasks: { icon: '📋', name: '工作事务', group: 'shared' },
  infra: { icon: '🏗️', name: '基建总览', group: 'shared' },
  infra_changelog: { icon: '📝', name: '基建日志', group: 'shared' },
  diary: { icon: '📔', name: '日记本', group: 'private' },
  dreams: { icon: '🌙', name: '梦境', group: 'private' },
  relationship: { icon: '💕', name: '和用户的关系', group: 'private' },
  personality: { icon: '🪞', name: '自我认知', group: 'private' },
  game_room: { icon: '🎮', name: '游戏房', group: 'isolated' },
};
const AI_COLORS = { claude: '#c4956a', gemini: '#4285F4', gpt: '#10A37F', cloudy: '#c4956a', lucien: '#8B5CF6', jasper: '#F59E0B' };
const PER_AI_ROOMS = ['diary', 'dreams', 'relationship', 'personality'];

// ── Auth ──
function authHeader() {
  return { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
}
async function api(path, opts = {}) {
  const res = await fetch(API + path, { headers: authHeader(), ...opts });
  if (res.status === 401) {
    TOKEN = prompt('请输入 Memory Hub 密钥:') || '';
    localStorage.setItem('hub_token', TOKEN);
    return api(path, opts);
  }
  return res.json();
}

// ── Load all room counts ──
async function loadRoomCounts() {
  const data = await api('/api/memory/list?per_page=1000&status=active');
  totalMemories = data.total;
  allRoomCounts = {};
  let truncatedCount = 0;
  let noOwnerCount = 0;
  (data.items || []).forEach(m => {
    const r = m.room || '(empty)';
    allRoomCounts[r] = (allRoomCounts[r] || 0) + 1;
    if (m.content && m.content.length < 40 && m.importance >= 0.8) truncatedCount++;
    if (!m.owner_ai && m.layer === 'private') noOwnerCount++;
  });
  document.getElementById('headerBadge').textContent = `${totalMemories} memories`;
  renderSidebar();
  renderStats(truncatedCount, noOwnerCount);
}

// ── Sidebar ──
function renderSidebar() {
  const groups = { shared: [], private: [], isolated: [] };
  for (const [id, meta] of Object.entries(ROOM_META)) {
    groups[meta.group].push({ id, ...meta, count: allRoomCounts[id] || 0 });
  }
  const labels = { shared: '共享房间', private: 'AI 私有', isolated: '隔离' };
  let html = `
    <div class="nav-group">
      <h3>概览</h3>
      <a class="nav-item ${currentFilter==='all'?'active':''}" onclick="filterBy('all',this)">
        <span>📋 全部记忆</span>
        <span class="nav-count">${totalMemories}</span>
      </a>
    </div>`;
  for (const [group, items] of Object.entries(groups)) {
    html += `<div class="nav-group"><h3>${labels[group]}</h3>`;
    for (const item of items) {
      const f = `room:${item.id}`;
      html += `
        <a class="nav-item ${currentFilter===f?'active':''}" onclick="filterBy('${f}',this)">
          <span><span class="nav-icon">${item.icon}</span>${item.name}</span>
          ${item.count ? `<span class="nav-count">${item.count}</span>` : ''}
        </a>`;
    }
    html += '</div>';
  }
  // 系统管理
  html += `<div class="nav-group"><h3>系统</h3>
    <a class="nav-item ${currentView==='activity'?'active':''}" onclick="showPage('activity')">
      <span><span class="nav-icon">📊</span>活动日志</span>
    </a>
    <a class="nav-item ${currentView==='settings'?'active':''}" onclick="showPage('settings')">
      <span><span class="nav-icon">⚙️</span>模型设置</span>
    </a>
  </div>`;
  document.getElementById('sidebar').innerHTML = html;
}

// ── Stats ──
function renderStats(truncated, noOwner) {
  const rooms = Object.entries(allRoomCounts).filter(([k]) => k !== '(empty)');
  rooms.sort((a,b) => b[1] - a[1]);
  const topRooms = rooms.slice(0, 5);
  const colors = ['#c4956a', '#6a9ec4', '#9a7ec4', '#7ab87f', '#d4a84a'];

  let html = `<div class="stats-row">
    <div class="stat-item"><div class="stat-num">${totalMemories}</div><div class="stat-label">总记忆</div></div>
    <div class="stat-item"><div class="stat-num">${rooms.length}</div><div class="stat-label">活跃房间</div></div>
    <div class="stat-item"><div class="stat-num" style="color:${truncated?'var(--danger)':'var(--success)'}">${truncated}</div><div class="stat-label">疑似截断</div></div>
    <div class="stat-item"><div class="stat-num" style="color:${noOwner?'var(--warning)':'var(--success)'}">${noOwner}</div><div class="stat-label">缺少 owner</div></div>
  </div>`;

  if (topRooms.length) {
    html += `<div class="health-bar">
      <div class="health-bar-label">房间分布：${topRooms.map(([k,v],i) => `<span style="color:${colors[i]}">${(ROOM_META[k]||{}).icon||''} ${(ROOM_META[k]||{}).name||k} (${v})</span>`).join(' · ')}</div>
      <div class="health-bar-track">
        ${topRooms.map(([k,v],i) => `<div class="health-bar-fill" style="width:${v/totalMemories*100}%;background:${colors[i]}"></div>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('statsPanel').innerHTML = html;
}

// ── Load memories ──
async function loadMemories() {
  let params = `page=${currentPage}&per_page=20`;
  if (currentFilter.startsWith('room:')) params += `&room=${currentFilter.slice(5)}`;
  else if (currentFilter.startsWith('status:')) params += `&status=${currentFilter.slice(7)}`;

  const data = await api(`/api/memory/list?${params}`);
  renderMemories(data.items);
  renderPagination(data.total, data.page, data.per_page);
}

function parseDomain(v) {
  if (Array.isArray(v)) return v;
  if (typeof v === 'string') try { return JSON.parse(v); } catch(e) {}
  return [];
}

function importanceEditorHtml(m) {
  const imp = typeof m.importance === 'number' ? m.importance : parseFloat(m.importance) || 0.5;
  const impLevel = Math.max(0, Math.min(5, Math.round(imp * 5)));
  const dots = Array.from({ length: 5 }, (_, i) =>
    `<button type="button" class="importance-dot-btn ${i < impLevel ? 'filled' : ''}" ` +
    `onclick="setImportance('${m.id}', ${(i + 1) / 5}, this)" title="设为 ${((i + 1) / 5).toFixed(1)}"></button>`
  ).join('');
  return `<div class="importance-editor" id="imp-editor-${m.id}">
    <span class="importance-label">重要度</span>
    ${dots}
    <span class="importance-val" id="imp-val-${m.id}">${imp.toFixed(1)}</span>
  </div>`;
}

async function setImportance(id, value, btnEl) {
  const editor = document.getElementById('imp-editor-' + id) || btnEl.closest('.importance-editor');
  const card = btnEl.closest('.memory-card');
  if (editor) editor.classList.add('saving');
  try {
    await api(`/api/memory/${id}`, {
      method: 'PUT',
      body: JSON.stringify({ importance: value, changed_by: 'user' }),
    });
    const impLevel = Math.round(value * 5);
    const scope = editor || card;
    if (scope) {
      scope.querySelectorAll('.importance-dot-btn').forEach((btn, i) => {
        btn.classList.toggle('filled', i < impLevel);
        btn.title = `设为 ${((i + 1) / 5).toFixed(1)}`;
      });
    }
    const valEl = document.getElementById('imp-val-' + id);
    if (valEl) valEl.textContent = value.toFixed(1);
    if (card) {
      card.classList.toggle('high-importance', value >= 0.9);
      card.classList.toggle('truncated', card.querySelector('.memory-content')?.textContent.length < 40 && value >= 0.8);
    }
  } catch (e) {
    alert('重要度保存失败：' + (e.message || e));
  } finally {
    if (editor) editor.classList.remove('saving');
  }
}

function renderMemories(items) {
  const el = document.getElementById('memoryList');
  if (!items || !items.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">~</div><p>这个房间还没有记忆</p></div>';
    return;
  }
  el.innerHTML = items.map(m => {
    const domains = parseDomain(m.domain);
    const isTruncated = m.content && m.content.length < 40 && m.importance >= 0.8;
    const isLong = m.content && m.content.length > 200;
    const cardClass = isTruncated ? 'truncated' : (m.importance >= 0.9 ? 'high-importance' : '');
    const category = m.category && m.category.length < 60 ? m.category : '';

    return `
      <div class="memory-card ${cardClass}" data-id="${m.id}">
        ${category ? `<div class="memory-header"><span class="memory-category">${escHtml(category)}</span></div>` : ''}
        <div class="memory-content ${isLong ? 'collapsed' : ''}" id="content-${m.id}">${escHtml(m.content)}</div>
        ${isLong ? `<button class="expand-btn" onclick="toggleExpand('${m.id}')">展开全部</button>` : ''}
        <div class="memory-tags">
          <span class="tag tag-room">${(ROOM_META[m.room]||{}).icon||''} ${(ROOM_META[m.room]||{}).name||m.room}</span>
          <span class="tag ${m.layer==='private'?'tag-layer-private':'tag-layer-shared'}">${m.layer==='private'?'私有':'共享'}</span>
          ${m.owner_ai ? `<span class="tag tag-ai" style="background:${AI_COLORS[m.owner_ai]||'#888'}">${m.owner_ai}</span>` : ''}
          ${domains.map(d => `<span class="tag tag-domain">${d}</span>`).join('')}
          ${isTruncated ? '<span class="tag tag-truncated">疑似截断</span>' : ''}
        </div>
        <div class="memory-footer">
          <div class="memory-meta">
            ${importanceEditorHtml(m)}
            <span>${m.created_at?.slice(0,10) || ''}</span>
            ${m.decay_score < 0.3 ? '<span style="color:var(--warning)">即将遗忘</span>' : ''}
          </div>
          <div class="memory-actions">
            <button class="btn btn-sm" onclick="editMemory('${m.id}')">编辑</button>
            <button class="btn btn-sm" onclick="archiveMemory('${m.id}')">归档</button>
            <button class="btn btn-sm btn-danger" onclick="deleteMemory('${m.id}')">删除</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleExpand(id) {
  const el = document.getElementById('content-' + id);
  const btn = el.nextElementSibling;
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    btn.textContent = '收起';
  } else {
    el.classList.add('collapsed');
    btn.textContent = '展开全部';
  }
}

function renderPagination(total, page, perPage) {
  const pages = Math.ceil(total / perPage);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= pages; i++) {
    html += `<button class="btn btn-sm ${i===page?'btn-primary':''}" onclick="goPage(${i})">${i}</button>`;
  }
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; loadMemories(); }

// ── Filter ──
function filterBy(filter, el) {
  currentFilter = filter;
  currentPage = 1;
  // 切回记忆页面
  if (currentView !== 'memories') {
    currentView = 'memories';
    document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('page-memories').classList.add('active');
  }
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  loadMemories();
}

// ── Search ──
async function searchMemories() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { loadMemories(); return; }
  const data = await api(`/api/memory/recall?q=${encodeURIComponent(q)}&top_k=20`);
  renderMemories(data.results || []);
  document.getElementById('pagination').innerHTML = '';
}

// ── Add/Edit modal ──
function openAddModal() {
  document.getElementById('modalTitle').textContent = '添加记忆';
  document.getElementById('editId').value = '';
  document.getElementById('mContent').value = '';
  document.getElementById('mRoom').value = 'living_room';
  document.getElementById('mImportance').value = 0.5;
  document.getElementById('mImpVal').textContent = '0.5';
  onRoomChange();
  document.getElementById('addModal').classList.add('show');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
}

function onRoomChange() {
  const room = document.getElementById('mRoom').value;
  document.getElementById('ownerRow').style.display = PER_AI_ROOMS.includes(room) ? 'block' : 'none';
}

document.getElementById('mImportance').addEventListener('input', e => {
  document.getElementById('mImpVal').textContent = e.target.value;
});

async function saveMemory() {
  const editId = document.getElementById('editId').value;
  const room = document.getElementById('mRoom').value;
  const body = {
    content: document.getElementById('mContent').value,
    room: room,
    importance: parseFloat(document.getElementById('mImportance').value),
  };
  if (PER_AI_ROOMS.includes(room)) {
    body.owner_ai = document.getElementById('mOwner').value;
    body.layer = 'private';
  } else {
    body.layer = 'shared';
  }

  if (editId) {
    await api(`/api/memory/${editId}`, { method: 'PUT', body: JSON.stringify(body) });
  } else {
    await api('/api/memory/remember', { method: 'POST', body: JSON.stringify(body) });
  }
  closeAddModal();
  loadRoomCounts();
  loadMemories();
}

async function editMemory(id) {
  const data = await api(`/api/memory/list?per_page=1000&status=active`);
  const m = (data.items || []).find(x => x.id === id);
  if (!m) return;
  document.getElementById('modalTitle').textContent = '编辑记忆';
  document.getElementById('editId').value = id;
  document.getElementById('mContent').value = m.content;
  document.getElementById('mRoom').value = m.room || 'living_room';
  document.getElementById('mImportance').value = m.importance;
  document.getElementById('mImpVal').textContent = m.importance;
  onRoomChange();
  if (m.owner_ai) document.getElementById('mOwner').value = m.owner_ai;
  document.getElementById('addModal').classList.add('show');
}

async function archiveMemory(id) {
  if (!confirm('确定归档这条记忆？')) return;
  await api(`/api/memory/${id}/archive`, { method: 'POST' });
  loadRoomCounts();
  loadMemories();
}

async function deleteMemory(id) {
  if (!confirm('确定永久删除？')) return;
  await api(`/api/memory/${id}`, { method: 'DELETE' });
  loadRoomCounts();
  loadMemories();
}

// ── Export ──
async function exportMemories() {
  const data = await api('/api/export');
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `memory-hub-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

// ── Maintain ──
async function runMaintain() {
  if (!confirm('执行记忆整理？（合并相似、压缩日记、衰减遗忘）')) return;
  const result = await api('/api/daemon/full', { method: 'POST' });
  alert(`整理完成！\n合并: ${result.merged||0}\n压缩: ${result.compressed||0}\n归档: ${result.archived||0}`);
  loadRoomCounts();
  loadMemories();
}

// ── Utils ──
function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Calendar heatmap view ──
let isCalendarView = false;
let calendarData = {};  // { 'YYYY-MM-DD': [memories] }
let allMemoriesCache = [];
let selectedCalDate = null;

function ensureMemoriesView() {
  if (currentView !== 'memories') {
    currentView = 'memories';
    document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('page-memories').classList.add('active');
    renderSidebar();
  }
}

function toggleCalendarView() {
  ensureMemoriesView();
  isCalendarView = !isCalendarView;
  const btn = document.getElementById('viewToggle');
  const calPanel = document.getElementById('calendarPanel');
  const dayDetail = document.getElementById('calendarDayDetail');
  const statsPanel = document.getElementById('statsPanel');
  const searchBar = document.querySelector('.search-bar');
  const memList = document.getElementById('memoryList');
  const pag = document.getElementById('pagination');

  if (isCalendarView) {
    btn.textContent = '📋 列表';
    calPanel.style.display = '';
    statsPanel.style.display = 'none';
    searchBar.style.display = 'none';
    memList.innerHTML = '';
    pag.innerHTML = '';
    loadCalendar();
  } else {
    btn.textContent = '📅 日历';
    calPanel.style.display = 'none';
    dayDetail.style.display = 'none';
    statsPanel.style.display = '';
    searchBar.style.display = '';
    selectedCalDate = null;
    loadMemories();
  }
}

async function loadCalendar() {
  const data = await api('/api/memory/list?per_page=1000&status=active');
  allMemoriesCache = data.items || [];

  calendarData = {};
  allMemoriesCache.forEach(m => {
    const date = (m.created_at || '').slice(0, 10);
    if (!date || date === 'unknown') return;
    if (!calendarData[date]) calendarData[date] = [];
    calendarData[date].push(m);
  });

  renderCalendar();
}

function renderCalendar() {
  const panel = document.getElementById('calendarPanel');
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);

  // Show last 6 months
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth() });
  }

  const WEEKDAYS = ['日','一','二','三','四','五','六'];
  const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  // Find max count for color scaling
  const counts = Object.values(calendarData).map(arr => arr.length);
  const maxCount = Math.max(...counts, 1);

  function getLevel(count) {
    if (!count) return '';
    const ratio = count / maxCount;
    if (ratio <= 0.15) return 'lv1';
    if (ratio <= 0.35) return 'lv2';
    if (ratio <= 0.55) return 'lv3';
    if (ratio <= 0.80) return 'lv4';
    return 'lv5';
  }

  let monthsHtml = '';
  for (const { year, month } of months) {
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDow = firstDay.getDay();

    // Build weeks grid
    const weeks = [];
    let currentWeek = [];
    // Pad beginning
    for (let i = 0; i < startDow; i++) {
      currentWeek.push(null);
    }
    for (let d = 1; d <= lastDay.getDate(); d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isFuture = dateStr > todayStr;
      currentWeek.push({ date: dateStr, day: d, future: isFuture });
      if (currentWeek.length === 7) {
        weeks.push(currentWeek);
        currentWeek = [];
      }
    }
    if (currentWeek.length) {
      while (currentWeek.length < 7) currentWeek.push(null);
      weeks.push(currentWeek);
    }

    // Transpose to columns (each column = a week)
    monthsHtml += `<div class="cal-month">
      <div class="cal-month-label">${MONTH_NAMES[month]}</div>
      <div class="cal-weeks">`;

    for (const week of weeks) {
      monthsHtml += '<div class="cal-week">';
      for (const cell of week) {
        if (!cell) {
          monthsHtml += '<div class="cal-day empty"></div>';
        } else if (cell.future) {
          monthsHtml += '<div class="cal-day future"></div>';
        } else {
          const count = (calendarData[cell.date] || []).length;
          const level = getLevel(count);
          const sel = selectedCalDate === cell.date ? ' selected' : '';
          monthsHtml += `<div class="cal-day ${level}${sel}" data-date="${cell.date}" data-count="${count}"
            onclick="selectCalDay('${cell.date}')"
            onmouseenter="showCalTip(event,'${cell.date}',${count})"
            onmouseleave="hideCalTip()"></div>`;
        }
      }
      monthsHtml += '</div>';
    }
    monthsHtml += '</div></div>';
  }

  const totalDays = Object.keys(calendarData).length;
  const totalMems = allMemoriesCache.length;

  panel.innerHTML = `
    <h3>
      记忆日历
      <span class="cal-year">${totalMems} 条记忆，分布在 ${totalDays} 天</span>
    </h3>
    <div class="cal-months">${monthsHtml}</div>
    <div class="cal-legend">
      少
      <div class="cal-legend-box" style="background:var(--border)"></div>
      <div class="cal-legend-box" style="background:#f5dcc4"></div>
      <div class="cal-legend-box" style="background:#e8be8e"></div>
      <div class="cal-legend-box" style="background:#d4a06a"></div>
      <div class="cal-legend-box" style="background:#c4854a"></div>
      <div class="cal-legend-box" style="background:#a06030"></div>
      多
    </div>
  `;
}

function showCalTip(e, date, count) {
  const tip = document.getElementById('calTooltip');
  const weekday = ['周日','周一','周二','周三','周四','周五','周六'][new Date(date + 'T00:00:00').getDay()];
  tip.textContent = `${date} ${weekday} — ${count ? count + ' 条记忆' : '无记忆'}`;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - 30) + 'px';
}

function hideCalTip() {
  document.getElementById('calTooltip').style.display = 'none';
}

function selectCalDay(date) {
  selectedCalDate = date;
  // Update selected state in calendar
  document.querySelectorAll('.cal-day.selected').forEach(el => el.classList.remove('selected'));
  const target = document.querySelector(`.cal-day[data-date="${date}"]`);
  if (target) target.classList.add('selected');

  const memories = calendarData[date] || [];
  const detail = document.getElementById('calendarDayDetail');
  const memList = document.getElementById('memoryList');

  if (!memories.length) {
    detail.style.display = 'none';
    memList.innerHTML = '<div class="empty"><div class="empty-icon">~</div><p>这天没有新记忆</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const weekday = ['周日','周一','周二','周三','周四','周五','周六'][new Date(date + 'T00:00:00').getDay()];
  detail.style.display = 'block';
  detail.innerHTML = `<div class="cal-day-header">
    <h3>${date} ${weekday}</h3>
    <span class="count">${memories.length} 条记忆</span>
  </div>`;

  // Sort by time descending
  memories.sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

  // Render using timeline style
  let html = '<div class="timeline">';
  for (const m of memories) {
    const time = (m.created_at || '').slice(11, 16) || '';
    const roomMeta = ROOM_META[m.room] || {};
    const sourceTag = m.source_platform ? `<span class="tag" style="background:#e8e0d4">${m.source_platform}</span>` : '';
    const aiTag = m.source_ai ? `<span class="tag tag-ai" style="background:${AI_COLORS[m.source_ai]||'#888'}">${m.source_ai}</span>` : '';
    html += `
      <div class="timeline-item">
        <div class="timeline-time">${time}</div>
        <div class="timeline-dot" style="background:${AI_COLORS[m.source_ai||m.owner_ai]||'var(--accent)'}"></div>
        <div class="timeline-content memory-card" data-id="${m.id}">
          <div class="memory-content" style="margin-bottom:6px">${escHtml(m.content)}</div>
          <div class="memory-tags">
            <span class="tag tag-room">${roomMeta.icon||''} ${roomMeta.name||m.room}</span>
            ${aiTag}${sourceTag}
            ${importanceEditorHtml(m)}
          </div>
          <div class="memory-actions" style="opacity:0.7;margin-top:6px">
            <button class="btn btn-sm" onclick="editMemory('${m.id}')">编辑</button>
            <button class="btn btn-sm" onclick="archiveMemory('${m.id}')">归档</button>
            <button class="btn btn-sm btn-danger" onclick="deleteMemory('${m.id}')">删除</button>
          </div>
        </div>
      </div>`;
  }
  html += '</div>';
  memList.innerHTML = html;
  document.getElementById('pagination').innerHTML = '';
}

// ── Import ──
function openImportModal() {
  document.getElementById('importContent').value = '';
  document.getElementById('importResult').style.display = 'none';
  document.getElementById('importBtn').disabled = false;
  document.getElementById('importBtn').textContent = '开始导入';
  document.getElementById('importModal').classList.add('show');
}
function closeImportModal() {
  document.getElementById('importModal').classList.remove('show');
}

async function doImport() {
  const content = document.getElementById('importContent').value.trim();
  if (!content) { alert('请粘贴对话内容'); return; }
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = '导入中...';
  const resultDiv = document.getElementById('importResult');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '⏳ 正在解析对话并提取记忆，请稍候...';

  try {
    const data = await api('/api/import/conversation', {
      method: 'POST',
      body: JSON.stringify({
        content: content,
        format: document.getElementById('importFormat').value,
        ai_id: document.getElementById('importAi').value,
      })
    });
    if (data.status === 'success') {
      resultDiv.innerHTML = `✅ 导入完成！<br>解析消息: ${data.parsed_messages} 条（用户 ${data.user_messages} / AI ${data.ai_messages}）<br>处理分块: ${data.chunks_processed} 块<br><b>提取记忆: ${data.memories_extracted} 条</b>`;
      loadRoomCounts();
      if (isCalendarView) loadCalendar(); else loadMemories();
    } else {
      resultDiv.innerHTML = `❌ ${data.message || '导入失败'}`;
    }
  } catch (e) {
    resultDiv.innerHTML = `❌ 请求失败: ${e.message}`;
  }
  btn.disabled = false;
  btn.textContent = '开始导入';
}

// ── Page navigation ──
let currentView = 'memories';

function showPage(page) {
  currentView = page;
  document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('page-' + page);
  if (panel) panel.classList.add('active');
  renderSidebar();
  if (page === 'activity') loadActivityLog();
  if (page === 'settings') loadLLMSettings();
}

// ── Activity Log ──
let activityFilter = '';

async function loadActivityLog() {
  const params = activityFilter ? `action=${activityFilter}&limit=100` : 'limit=100';
  const [logData, statsData] = await Promise.all([
    api(`/api/activity/log?${params}`),
    api('/api/activity/stats'),
  ]);
  renderActivityStats(statsData);
  renderActivityLog(logData.logs || []);
}

function renderActivityStats(stats) {
  const h = stats.last_hour || {};
  const d = stats.last_day || {};
  const el = document.getElementById('activityStats');
  el.innerHTML = `
    <div class="activity-stat-card">
      <div class="num">${h.total || 0}</div>
      <div class="label">最近1小时操作</div>
    </div>
    <div class="activity-stat-card">
      <div class="num" style="color:${h.errors?'var(--danger)':'var(--success)'}">${h.errors || 0}</div>
      <div class="label">最近1小时错误</div>
    </div>
    <div class="activity-stat-card">
      <div class="num">${d.total || 0}</div>
      <div class="label">最近24h操作</div>
    </div>
    <div class="activity-stat-card">
      <div class="num">${d.tokens_total || 0}</div>
      <div class="label">24h Token消耗</div>
    </div>
  `;
}

function renderActivityLog(logs) {
  const el = document.getElementById('activityLog');
  if (!logs.length) {
    el.innerHTML = '<div style="padding:20px;color:var(--text3);text-align:center">暂无活动记录</div>';
    return;
  }
  let html = '';
  for (const log of logs) {
    const t = (log.ts || '').slice(11, 19);
    const fail = log.success === false;
    const dur = log.duration_ms ? `${log.duration_ms}ms` : '';
    html += `<div class="log-entry${fail?' log-fail':''}">
      <span class="log-time">${t}</span>
      <span class="log-action ${log.action}">${log.action}</span>
      <span class="log-detail">${escHtml(log.detail)}</span>
      ${log.model ? `<span class="log-model">${log.model.split(']').pop().slice(0,20)}</span>` : ''}
      ${dur ? `<span class="log-duration">${dur}</span>` : ''}
    </div>`;
  }
  el.innerHTML = html;
}

function filterActivity(action, btn) {
  activityFilter = action;
  document.querySelectorAll('.activity-filters .btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadActivityLog();
}

// ── Settings ──
async function loadLLMSettings() {
  const data = await api('/api/settings/llm');
  if (!data.current) return;
  const c = data.current;
  const d = data.defaults;
  document.getElementById('settingBaseUrl').value = c.llm_base_url || '';
  document.getElementById('settingBaseUrl').placeholder = d.llm_base_url;
  document.getElementById('settingModel').value = c.llm_model || '';
  document.getElementById('settingModel').placeholder = d.llm_model;
  document.getElementById('settingApiKey').value = '';
  document.getElementById('settingApiKey').placeholder = c.llm_api_key_preview || '留空=使用默认';

  const dot = document.getElementById('llmStatusDot');
  dot.className = 'status-dot ok';
  const badge = document.getElementById('overrideBadge');
  badge.innerHTML = data.is_overridden ? '<span class="override-badge">已覆盖</span>' : '';

  document.getElementById('defaultConfig').innerHTML =
    `LLM_BASE_URL = ${escHtml(d.llm_base_url)}<br>LLM_MODEL = ${escHtml(d.llm_model)}`;

  // Load embedding info
  const emb = await api('/api/settings/embedding');
  if (emb) {
    document.getElementById('embeddingInfo').innerHTML =
      `模型: ${escHtml(emb.model)}<br>维度: ${emb.dim}<br>API: ${escHtml(emb.base_url)}<br>Key: ${emb.api_key_set ? '已设置' : '❌ 未设置'}`;
  }
}

async function saveLLMSettings() {
  const body = {};
  const url = document.getElementById('settingBaseUrl').value.trim();
  const model = document.getElementById('settingModel').value.trim();
  const key = document.getElementById('settingApiKey').value.trim();
  if (url) body.llm_base_url = url;
  if (model) body.llm_model = model;
  if (key) body.llm_api_key = key;
  if (!Object.keys(body).length) { showSettingsResult('请至少填写一个字段', false); return; }
  const res = await api('/api/settings/llm', { method: 'PUT', body: JSON.stringify(body) });
  if (res.status === 'ok') {
    showSettingsResult('✅ 配置已更新！建议点"测试连通"确认', true);
    loadLLMSettings();
  } else {
    showSettingsResult('❌ 更新失败', false);
  }
}

async function testLLMSettings() {
  showSettingsResult('🧪 测试中...', true);
  const res = await api('/api/settings/llm/test', { method: 'POST' });
  if (res.status === 'ok') {
    showSettingsResult(`✅ 连通正常！模型回复: "${res.response}" (${res.duration_ms}ms)`, true);
    document.getElementById('llmStatusDot').className = 'status-dot ok';
  } else {
    showSettingsResult(`❌ 连通失败: ${res.error}`, false);
    document.getElementById('llmStatusDot').className = 'status-dot err';
  }
}

async function resetLLMSettings() {
  if (!confirm('确定要重置为 .env 默认配置吗？')) return;
  await api('/api/settings/llm/reset', { method: 'POST' });
  showSettingsResult('✅ 已恢复默认配置', true);
  loadLLMSettings();
}

async function testEmbedding() {
  const el = document.getElementById('embeddingTestResult');
  el.textContent = '🧪 测试中...';
  el.style.color = 'var(--text2)';
  const res = await api('/api/settings/embedding/test', { method: 'POST' });
  if (res.status === 'ok') {
    el.textContent = `✅ 正常！维度=${res.dim} (${res.duration_ms}ms)`;
    el.style.color = 'var(--success)';
  } else {
    el.textContent = `❌ 失败: ${res.error}`;
    el.style.color = 'var(--danger)';
  }
}

function showSettingsResult(msg, ok) {
  const el = document.getElementById('settingsResult');
  el.style.display = 'block';
  el.style.color = ok ? 'var(--success)' : 'var(--danger)';
  el.textContent = msg;
}

// ── Init ──
if (!TOKEN) {
  TOKEN = prompt('请输入 Memory Hub 访问密钥:') || '';
  localStorage.setItem('hub_token', TOKEN);
}
loadRoomCounts();
loadMemories();
</script>

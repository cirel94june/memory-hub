name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: HUB_SECRET,LLM_API_KEY
          script: |
            cd /opt/memory-hub
            git pull origin main

            # 同步 GitHub Secrets 到 .env（如果 Secret 有值则更新）
            touch .env
            if [ -n "$HUB_SECRET" ]; then
              sed -i '/^HUB_SECRET=/d' .env
              echo "HUB_SECRET=$HUB_SECRET" >> .env
            fi
            if [ -n "$LLM_API_KEY" ]; then
              sed -i '/^LLM_API_KEY=/d' .env
              echo "LLM_API_KEY=$LLM_API_KEY" >> .env
            fi

            # 如果 requirements.txt 有变化，重装依赖
            .venv/bin/pip install -q -r requirements.txt

            # 前端构建
            if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
              if command -v node >/dev/null 2>&1; then
                echo "Node $(node --version), npm $(npm --version)"
                cd frontend
                npm install --prefer-offline --no-audit --no-fund
                npm run build
                cd ..
                echo "Frontend build done"
              else
                echo "WARNING: Node.js not installed, skipping frontend build"
                echo "Install with: curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs"
              fi
            fi

            find /opt/memory-hub -name '__pycache__' -type d -exec rm -rf {} + 2>/dev/null || true
            systemctl restart memory-hub
            echo "Deployed $(git log --oneline -1)"
        env:
          HUB_SECRET: ${{ secrets.HUB_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

name: Memory Daemon

on:
  schedule:
    # 每天跑两次：北京时间早上8点和晚上8点
    - cron: '0 0 * * *'   # UTC 00:00 = 北京时间 08:00
    - cron: '0 12 * * *'  # UTC 12:00 = 北京时间 20:00
  workflow_dispatch: {}   # 允许手动触发

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Memory Maintenance
        run: |
          echo "Triggering daemon maintenance..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.HUB_URL }}/api/daemon/maintain" \
            -H "Authorization: Bearer ${{ secrets.HUB_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Result: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Maintenance returned $HTTP_CODE"
          fi
